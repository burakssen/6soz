<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>6soz</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px;
      box-sizing: border-box;
    }

    #canvas {
      display: block;
      border: 0;
      padding: 0;
      margin: 0;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
      flex: 0 1 auto;
    }

    #rom-credits {
      z-index: 10;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.72);
      color: #e8e8e8;
      font: 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: min(560px, 100%);
      box-sizing: border-box;
      text-align: center;
    }

    #rom-credits a {
      color: #9ecbff;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <aside id="rom-credits">
    Sample ROM credits:
    <a href="https://mercurybd.itch.io/ravens-gate-nes" target="_blank" rel="noopener noreferrer">
      Ravens Gate (NES) by MercuryBD
    </a>
    ·
    <a href="https://binji.itch.io/porklikegb" target="_blank" rel="noopener noreferrer">
      Porklike GB by Binji
    </a>
  </aside>

  <script>
    const canvas = document.querySelector("#canvas");
    const credits = document.querySelector("#rom-credits");
    const audioContexts = [];

    function installAudioContextProxy(name) {
      const AudioContextCtor = self[name];
      if (!AudioContextCtor) return;

      self[name] = new Proxy(AudioContextCtor, {
        construct(target, args) {
          const context = new target(...args);
          audioContexts.push(context);
          return context;
        },
      });
    }

    installAudioContextProxy("AudioContext");
    installAudioContextProxy("webkitAudioContext");

    function resumeAudio() {
      for (const context of audioContexts) {
        if (context.state === "suspended") {
          context.resume();
        }
      }
    }

    function resizeCanvasCss() {
      const width = canvas.width || 1;
      const height = canvas.height || 1;

      const bodyStyle = getComputedStyle(document.body);

      const paddingX =
        parseFloat(bodyStyle.paddingLeft) +
        parseFloat(bodyStyle.paddingRight);

      const paddingY =
        parseFloat(bodyStyle.paddingTop) +
        parseFloat(bodyStyle.paddingBottom);

      const gap = parseFloat(bodyStyle.gap) || 0;
      const creditsHeight = credits ? credits.getBoundingClientRect().height : 0;

      const maxWidth = Math.max(1, window.innerWidth - paddingX);
      const maxHeight = Math.max(
        1,
        window.innerHeight - paddingY - gap - creditsHeight
      );

      const scale = Math.min(maxWidth / width, maxHeight / height);

      const cssWidth = Math.floor(width * scale);
      const cssHeight = Math.floor(height * scale);

      canvas.style.setProperty("width", `${Math.max(1, cssWidth)}px`, "important");
      canvas.style.setProperty("height", `${Math.max(1, cssHeight)}px`, "important");
    }

    window.addEventListener("resize", resizeCanvasCss);
    canvas.addEventListener("pointerdown", resumeAudio);
    window.addEventListener("keydown", resumeAudio);

    canvas.addEventListener("webglcontextlost", function (event) {
      event.preventDefault();
      console.error("WebGL context lost. Reload the page to continue.");
    }, false);

    new MutationObserver(resizeCanvasCss).observe(canvas, {
      attributes: true,
      attributeFilter: ["width", "height"],
    });

    if ("ResizeObserver" in window && credits) {
      new ResizeObserver(resizeCanvasCss).observe(credits);
    }

    resizeCanvasCss();

    var Module = {
      preRun: [],
      postRun: [resizeCanvasCss],

      print(text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        console.log(text);
      },

      printErr(text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        console.error(text);
      },

      canvas,

      setStatus(text) {
        if (text) {
          console.log(text);
        }
      },

      totalDependencies: 0,

      monitorRunDependencies(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);

        if (left) {
          Module.setStatus(
            `Preparing... (${this.totalDependencies - left}/${this.totalDependencies})`
          );
        }
      },
    };

    window.onerror = function (message, source, line, column, error) {
      console.error(message, source, line, column, error && error.stack);
    };
  </script>

  {{{ SCRIPT }}}
</body>

</html>
