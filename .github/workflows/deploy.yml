name: Build, Test, and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify-native:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Zig global cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: ${{ runner.os }}-zig-native-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-native-
            ${{ runner.os }}-zig-

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Build native host
        run: zig build

      - name: Smoke NES sample
        run: zig build smoke -- nes roms/nes/ravens_gate_mmc1.nes --frames 2

      - name: Smoke Game Boy sample
        run: zig build smoke -- gb roms/gb/porklike.gb --frames 2 --boot-rom roms/gb/boot.rom.gb --model dmg

  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Zig global cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: ${{ runner.os }}-zig-web-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-web-
            ${{ runner.os }}-zig-

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Cache Emscripten
        uses: actions/cache@v4
        with:
          path: |
            ~/.emscripten_cache
            ~/.emscripten_ports
          key: ${{ runner.os }}-emsdk-${{ hashFiles('.emscripten') }}
          restore-keys: |
            ${{ runner.os }}-emsdk-

      - name: Build WASM
        run: zig build -Dtarget=wasm32-emscripten -Doptimize=ReleaseSmall

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/web

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [verify-native, build-web]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
